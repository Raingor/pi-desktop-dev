name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Frontend: type-check, lint, unit tests, build ─────────
  frontend:
    name: Frontend (tsc + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # ─── Backend: clippy + tests ───────────────────────────────
  backend:
    name: Backend (clippy + cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --lib -- -D warnings
        continue-on-error: true # clippy warnings exist; don't block yet

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --lib

  # ─── macOS universal binary build (intel + apple silicon) ──
  macos-build:
    name: macOS Build (universal)
    runs-on: macos-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Add Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build frontend
        run: npm run build

      - name: Build macOS universal app
        working-directory: src-tauri
        run: cargo build --release --target aarch64-apple-darwin --target x86_64-apple-darwin
        continue-on-error: true # signing may fail in CI; build validation is the goal
